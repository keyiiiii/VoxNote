name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # バージョン番号を分解 (1.4.1 → MARKETING_VERSION=1.4.1, BUILD=1)
          BUILD_NUMBER=$(echo "$VERSION" | tr -dc '.' | wc -c | xargs expr 1 +)
          xcodebuild \
            -project VoxNote.xcodeproj \
            -scheme VoxNote \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            build

      - name: Package app
        id: package
        run: |
          APP_PATH=$(find build/DerivedData -name "VoxNote.app" -type d | head -1)
          if [[ -z "$APP_PATH" ]]; then
            echo "::error::VoxNote.app not found"
            exit 1
          fi

          # VoxBridge 方式: 個別バイナリ → フレームワーク → アプリ全体の順で署名
          echo "Signing individual binaries..."
          find "$APP_PATH" -type f \( -name "*.dylib" -o -name "*.so" \) | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done

          echo "Signing app bundle..."
          codesign --force --sign - "$APP_PATH"

          # 署名の検証
          codesign --verify --verbose "$APP_PATH" 2>&1 || true

          # Create ZIP (preserving symlinks and resource forks)
          ZIP_NAME="VoxNote-${{ steps.version.outputs.version }}.zip"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/$ZIP_NAME"

          # SHA256 checksum
          shasum -a 256 "dist/$ZIP_NAME" > "dist/$ZIP_NAME.sha256"

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_path=dist/$ZIP_NAME" >> "$GITHUB_OUTPUT"

          echo "Package created: dist/$ZIP_NAME"
          ls -lh "dist/$ZIP_NAME"
          cat "dist/$ZIP_NAME.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxNote-${{ steps.version.outputs.version }}
          path: dist/VoxNote-*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ steps.package.outputs.zip_name }}
            dist/${{ steps.package.outputs.zip_name }}.sha256
          generate_release_notes: true
          body: |
            インストール方法は [README](https://github.com/keyiiiii/VoxNote#インストール) を参照してください。

      - name: Update Homebrew Tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping tap update"
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(cat "dist/${{ steps.package.outputs.zip_name }}.sha256" | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/keyiiiii/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/voxnote.rb << CASK
          cask "voxnote" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/keyiiiii/VoxNote/releases/download/v#{version}/VoxNote-#{version}.zip"
            name "VoxNote"
            desc "Real-time meeting transcription app powered by whisper.cpp"
            homepage "https://github.com/keyiiiii/VoxNote"

            depends_on macos: ">= :ventura"

            app "VoxNote.app"

            zap trash: [
              "~/Library/Application Support/VoxNote",
            ]
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/voxnote.rb
          git commit -m "Update VoxNote to ${VERSION}" || exit 0
          git push
